name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, uat]

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-production:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy Production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_TEAM_PASSWORD: ${{ secrets.VITE_TEAM_PASSWORD }}
          VITE_CONFIG_PASSWORD: ${{ secrets.VITE_CONFIG_PASSWORD }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=wandora-workspace
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Print deployment URL
        run: echo "Production deployed to https://workspace.wandora.ai (${{ steps.deploy.outputs.deployment-url }})"

  deploy-uat:
    if: github.ref_name == 'uat'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy UAT
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_TEAM_PASSWORD: ${{ secrets.VITE_TEAM_PASSWORD }}
          VITE_CONFIG_PASSWORD: ${{ secrets.VITE_CONFIG_PASSWORD }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=wandora-workspace --branch=uat
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Print deployment URL
        run: echo "UAT deployed to https://uat.wandora-workspace.pages.dev (${{ steps.deploy.outputs.deployment-url }})"
