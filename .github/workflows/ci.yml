name: CI

on:
  pull_request:
    branches: [main, uat]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # No VITE_* secrets here on purpose: this only proves the app compiles
      # and bundles. The passwords are read as `import.meta.env.VITE_* ?? ""`,
      # so their absence cannot fail the build — and keeping them out means a
      # PR's own workflow code never gets handed production secrets.
      - name: Build
        run: npm run build
